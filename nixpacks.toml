[phases.setup]
nixPkgs = ["nodejs_18"]
aptPkgs = ["libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["echo 'Build phase complete'"]

[start]
cmd = "npm start"
